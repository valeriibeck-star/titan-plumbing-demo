version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kompozit-db
    environment:
      POSTGRES_DB: kompozit_erp
      POSTGRES_USER: kompozit
      POSTGRES_PASSWORD: kompozit_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kompozit -d kompozit_erp"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
